<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dead-man-hand</title>
<style>
body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
button { font-size: 1.5rem; padding: 1rem 2rem; border: none; border-radius: 8px; background: #2e7d32; color: #fff; cursor: pointer; }
button:disabled { background: #9e9e9e; cursor: wait; }
#status { min-height: 1.5rem; margin-top: 1rem; font-size: 1.1rem; }
.ok { color: #2e7d32; }
.error { color: #c62828; }
</style>
</head>
<body>
<h1>dead-man-hand</h1>
<button id="alive">I am alive</button>
<p id="status"></p>
<script>
const button = document.getElementById("alive");
const status = document.getElementById("status");
button.addEventListener("click", async () => {
	button.disabled = true;
	status.textContent = "";
	status.className = "";
	try {
		const resp = await fetch(window.location.pathname + window.location.search, {method: "POST"});
		if (resp.ok) {
			status.textContent = "Confirmed, see you soon!";
			status.className = "ok";
		} else {
			status.textContent = "Failed to confirm, server returned status " + resp.status;
			status.className = "error";
		}
	} catch (err) {
		status.textContent = "Failed to confirm: " + err;
		status.className = "error";
	}
	button.disabled = false;
});
</script>
</body>
</html>
